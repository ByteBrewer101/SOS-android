services:

  # ─── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: sos_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      # Persistent data — survives container restarts and upgrades
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - sos_internal
    # MongoDB is NOT exposed to the host; only reachable inside the Docker network
    # (the backend reaches it via the service name "mongo")

  # ─── Node.js API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: sos-api:latest
    container_name: sos_api
    restart: always
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 5000

      # MongoDB — uses the internal service hostname "mongo" + credentials
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB_NAME}?authSource=admin

      # Auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}

      # Aadhaar encryption (must be exactly 32 chars for AES-256)
      AADHAAR_ENCRYPTION_KEY: ${AADHAAR_ENCRYPTION_KEY}

      # CORS — set to your frontend domain in production
      CORS_ORIGIN: ${CORS_ORIGIN:-*}

      # Rate limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}

      # Optional: SMS & Firebase (leave blank to keep stubbed)
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_SENDER_ID: ${SMS_SENDER_ID:-SOSAPP}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}

    ports:
      # Map host port → container port.
      # Put Nginx/Caddy in front of this on the VPS and only bind 127.0.0.1
      # so port 5000 is NOT directly reachable from the internet:
      #   ports: ["127.0.0.1:5000:5000"]
      - "5000:5000"

    networks:
      - sos_internal

    # Keep SSE connections alive — prevent Docker's proxy from cutting idle streams
    sysctls:
      net.ipv4.tcp_keepalive_time: 60

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  sos_internal:
    driver: bridge
